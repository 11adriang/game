<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sword &amp; Scroll — Adventures from the Bible</title>
<style>
html,body{margin:0;padding:0;background:#0a0910;height:100%;overflow:hidden;touch-action:none;font-family:Georgia,serif}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
canvas{background:#000;border-radius:6px;box-shadow:0 10px 60px rgba(0,0,0,.7)}
#pad{position:fixed;bottom:calc(10px + env(safe-area-inset-bottom));left:0;right:0;display:none;justify-content:space-between;padding:0 14px;z-index:5;pointer-events:none}
#pad>*{pointer-events:auto}
.pbtn{width:56px;height:56px;border-radius:14px;background:rgba(240,181,65,.14);border:1.5px solid rgba(240,181,65,.45);color:#f0c96a;font:bold 20px Georgia;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;backdrop-filter:blur(3px)}
.pbtn:active{background:rgba(240,181,65,.32)}
#dpad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px 56px;gap:4px}
#dpad .sp{border:none;background:none;pointer-events:none}
.pbtn svg.tri{pointer-events:none;display:block}
#pauseBtn{position:fixed;top:calc(8px + env(safe-area-inset-top));right:10px;z-index:6;width:44px;height:38px;border-radius:10px;background:rgba(20,16,10,.6);border:1.5px solid rgba(240,181,65,.5);color:#f0c96a;font:bold 15px Georgia;display:none;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
@media (pointer:coarse){#pad{display:flex}}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<div id="pauseBtn">&#9776;</div>
<div id="pad">
 <div id="dpad">
  <div class="pbtn sp"></div><div class="pbtn" data-k="up"><svg class="tri" viewBox="0 0 20 20" width="22" height="22"><polygon points="10,3 18,17 2,17" fill="#f0b541"/></svg></div><div class="pbtn sp"></div>
  <div class="pbtn" data-k="left"><svg class="tri" viewBox="0 0 20 20" width="22" height="22" style="transform:rotate(-90deg)"><polygon points="10,3 18,17 2,17" fill="#f0b541"/></svg></div><div class="pbtn sp"></div><div class="pbtn" data-k="right"><svg class="tri" viewBox="0 0 20 20" width="22" height="22" style="transform:rotate(90deg)"><polygon points="10,3 18,17 2,17" fill="#f0b541"/></svg></div>
  <div class="pbtn sp"></div><div class="pbtn" data-k="down"><svg class="tri" viewBox="0 0 20 20" width="22" height="22" style="transform:rotate(180deg)"><polygon points="10,3 18,17 2,17" fill="#f0b541"/></svg></div><div class="pbtn sp"></div>
 </div>
 <div style="display:flex;align-items:flex-end"><div class="pbtn" data-k="action" style="width:72px;height:72px;border-radius:50%;font-size:24px">A</div></div>
</div>
<script>
'use strict';
/* ============ CORE (logical 320x180, rendered at 4x — 16-bit, high resolution) ============ */
const W=320,H=180,SC=4;
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
cv.width=W*SC;cv.height=H*SC;
function fit(){const padH=matchMedia('(pointer:coarse)').matches?128:0;
 const s=Math.min(innerWidth/W,(innerHeight-padH)/H);
 cv.style.width=W*s+'px';cv.style.height=H*s+'px';}
addEventListener('resize',fit);fit();

const C={sand:'#e8c170',dsand:'#c99b4a',clay:'#b4553a',dclay:'#7a3b2e',night:'#1a1c3a',sky:'#7fb3d5',water:'#2a5a9a',dwater:'#1c3f70',green:'#5a8a3a',parch:'#f5ecd7',ink:'#181410',gold:'#f0b541',skin:'#d9a066',dskin:'#a5673f',red:'#a53030',gray:'#8a8680',iron:'#6b6f76',purple:'#5a3a6e',wood:'#8a5a2a',dwood:'#5e3c1c'};
function shade(hex,f){ // lighten f>0, darken f<0
 const n=parseInt(hex.slice(1),16);let r=n>>16,g=(n>>8)&255,b=n&255;
 if(f>=0){r+=(255-r)*f;g+=(255-g)*f;b+=(255-b)*f;}else{r*=1+f;g*=1+f;b*=1+f;}
 return '#'+((1<<24)|(Math.round(r)<<16)|(Math.round(g)<<8)|Math.round(b)).toString(16).slice(1);}
function mix(h1,h2,t){t=t<0?0:t>1?1:t;const a=parseInt(h1.slice(1),16),b=parseInt(h2.slice(1),16);
 const r=((a>>16)&255)+(((b>>16)&255)-((a>>16)&255))*t,g=((a>>8)&255)+(((b>>8)&255)-((a>>8)&255))*t,c=(a&255)+((b&255)-(a&255))*t;
 return '#'+((1<<24)|(Math.round(r)<<16)|(Math.round(g)<<8)|Math.round(c)).toString(16).slice(1);}

let rseed=1;function srand(s){rseed=(s>>>0)||1}
function rnd(){rseed^=rseed<<13;rseed^=rseed>>>17;rseed^=rseed<<5;rseed>>>=0;return rseed/4294967296}
function clamp(v,a,b){return v<a?a:v>b?b:v}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by)}
/* shortest distance from point (px,py) to the segment (ax,ay)-(bx,by) */
function ptSeg(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
 if(l2===0)return dist(px,py,ax,ay);
 let t=((px-ax)*dx+(py-ay)*dy)/l2;t=t<0?0:t>1?1:t;
 return dist(px,py,ax+t*dx,ay+t*dy);}

/* ============ DIFFICULTY ============ */
const DIFFS=[
 {name:'EASY',  enemy:.78,timer:1.3,ramp:.55,hearts:4},
 {name:'NORMAL',enemy:1,  timer:1,  ramp:1.35,hearts:3},
 {name:'HARD',  enemy:1.9,timer:.55,ramp:2.2,hearts:2}];
let dsel=1;
function D(){return DIFFS[dsel];}
function HARD(){return dsel===2;}
/* difficulty ramps up as you near victory: p = progress 0..1 */
function ramp(p){return 1+clamp(p,0,1)*.7*D().ramp;}

/* ============ INPUT ============ */
const keys={left:false,right:false,up:false,down:false,action:false};
const lastKeys={},edge={},dirQ={};let actQ=false,pauseQ=false;
const KEYMAP={ArrowLeft:'left',a:'left',A:'left',ArrowRight:'right',d:'right',D:'right',ArrowUp:'up',w:'up',W:'up',ArrowDown:'down',s:'down',S:'down',' ':'action',Enter:'action',e:'action',E:'action'};
addEventListener('keydown',e=>{const k=KEYMAP[e.key];if(k){if(k==='action')actQ=true;else if(!e.repeat)dirQ[k]=true;keys[k]=true;e.preventDefault();audioInit();}
 if(e.key==='m'||e.key==='M')musicOn=!musicOn;
 if(e.key==='Escape')pauseQ=true;});
addEventListener('keyup',e=>{const k=KEYMAP[e.key];if(k)keys[k]=false;});
document.querySelectorAll('.pbtn[data-k]').forEach(b=>{const k=b.dataset.k;
 const on=e=>{e.preventDefault();if(k==='action')actQ=true;else dirQ[k]=true;keys[k]=true;audioInit();};
 const off=e=>{e.preventDefault();keys[k]=false;};
 b.addEventListener('touchstart',on,{passive:false});b.addEventListener('touchend',off);b.addEventListener('touchcancel',off);
 b.addEventListener('mousedown',on);b.addEventListener('mouseup',off);b.addEventListener('mouseleave',off);});
const pauseBtn=document.getElementById('pauseBtn');
pauseBtn.addEventListener('touchstart',e=>{e.preventDefault();pauseQ=true;audioInit();},{passive:false});
pauseBtn.addEventListener('mousedown',e=>{e.preventDefault();pauseQ=true;audioInit();});
let clickPt=null;
cv.addEventListener('pointerdown',e=>{audioInit();const r=cv.getBoundingClientRect();clickPt={x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H};});
function updEdges(){for(const k in keys){edge[k]=(keys[k]&&!lastKeys[k])||!!dirQ[k];lastKeys[k]=keys[k];delete dirQ[k];}if(actQ){edge.action=true;actQ=false;}}
function tap(){if(clickPt){clickPt=null;return true}return false}

/* ============ AUDIO (all procedural) ============ */
let AC=null,masterGain=null,musicOn=true;
function audioInit(){if(AC)return;try{AC=new (window.AudioContext||window.webkitAudioContext)();masterGain=AC.createGain();masterGain.gain.value=.5;masterGain.connect(AC.destination);}catch(e){}}
function tone(f,dur,type,vol,slide,when){if(!AC)return;type=type||'square';vol=vol||.3;slide=slide||0;when=when||0;
 const t=AC.currentTime+when,o=AC.createOscillator(),g=AC.createGain();
 o.type=type;o.frequency.setValueAtTime(f,t);
 if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,f+slide),t+dur);
 g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
 o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.02);}
function noiseSfx(dur,vol,fc,when){if(!AC)return;vol=vol||.3;fc=fc||1000;when=when||0;
 const t=AC.currentTime+when,len=Math.floor(AC.sampleRate*dur),buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);
 for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
 const n=AC.createBufferSource();n.buffer=buf;
 const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=fc;
 const g=AC.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
 n.connect(f);f.connect(g);g.connect(masterGain);n.start(t);}
const sfx={
 shoot(){tone(600,.15,'square',.2,-420)},
 clank(){tone(180,.08,'square',.2,-60)},
 hit(){noiseSfx(.18,.3,900)},
 pick(){tone(700,.07,'triangle',.22);tone(1050,.09,'triangle',.2,0,.07)},
 trumpet(){[349,440,523].forEach((f,i)=>{tone(f,.55,'sawtooth',.15,25,i*.03)})},
 blast(){[293,370,440,587].forEach((f,i)=>{tone(f,.9,'sawtooth',.14,30,i*.02)});noiseSfx(.5,.24,600,.15)},
 thunder(){noiseSfx(1.1,.38,280)},
 roar(){tone(85,.5,'sawtooth',.26,-40);noiseSfx(.5,.2,400)},
 splash(){noiseSfx(.3,.28,1600)},
 pray(){tone(880,.3,'triangle',.2);tone(1174.7,.4,'triangle',.17,0,.15)},
 angel(){[784,988,1175,1568].forEach((f,i)=>tone(f,.4,'triangle',.17,0,i*.1))},
 win(){[523,659,784,1046].forEach((f,i)=>tone(f,.26,'triangle',.22,0,i*.14))},
 lose(){[392,330,262,196].forEach((f,i)=>tone(f,.3,'triangle',.22,0,i*.18))},
 talk(){tone(430,.05,'sine',.06)},
 step(){tone(160,.04,'square',.05)}
};
/* ============ MUSIC (procedural SNES-style chip-tunes — a theme for every tale) ============ */
let mNext=0,mStep=0,mKey='';
function scl(root,ints){return ints.map(s=>root*Math.pow(2,s/12));}
const TRACKS={
 /* menu: the old hijaz scroll theme */
 menu:   {s:[293.66,311.13,370.0,392.0,440.0,466.16,554.37,587.33],
          p:[0,2,1,0,3,2,4,3,5,4,3,2,1,2,0,-1,0,1,2,4,3,2,4,5,7,5,4,3,2,1,0,-1],st:.26,w:'triangle',v:.05,b:8},
 /* abraham: solemn minor ascent up the mount */
 abraham:{s:scl(220,[0,3,5,7,10,12,15,19]),
          p:[0,-1,2,-1,3,-1,2,1,0,-1,2,3,4,-1,3,2,0,-1,2,-1,5,-1,4,3,2,-1,1,-1,0,-1,-1,-1],st:.32,w:'triangle',v:.045,b:8},
 /* noah: gentle pastoral major */
 noah:   {s:scl(261.63,[0,2,4,7,9,12,14,16]),
          p:[0,2,4,2,3,4,5,4,2,4,5,7,5,4,2,0,1,2,3,2,4,5,4,2,0,-1,2,-1,0,-1,-1,-1],st:.27,w:'triangle',v:.05,b:4},
 /* moses: driving double-harmonic pursuit */
 moses:  {s:scl(293.66,[0,1,4,5,7,8,11,12]),
          p:[0,0,4,0,3,0,4,5,0,0,4,0,7,5,4,3,0,0,4,0,3,0,4,5,7,-1,5,-1,4,3,2,1],st:.17,w:'sawtooth',v:.032,b:4},
 /* joshua: dorian war-march */
 joshua: {s:scl(196,[0,2,3,5,7,9,10,12]),
          p:[0,0,-1,0,2,-1,3,-1,4,4,-1,4,5,4,3,2,0,0,-1,0,2,-1,3,-1,7,-1,5,4,3,2,1,0],st:.21,w:'square',v:.028,b:4},
 /* gideon: sparse low night-watch */
 gideon: {s:scl(146.83,[0,3,5,6,7,10,12,15]),
          p:[0,-1,-1,3,-1,-1,2,-1,-1,-1,4,-1,3,-1,-1,-1,0,-1,-1,3,-1,5,-1,4,-1,-1,3,-1,2,-1,-1,-1],st:.3,w:'sine',v:.06,b:16},
 /* david: heroic mixolydian arpeggios */
 david:  {s:scl(261.63,[0,2,4,5,7,9,10,12]),
          p:[0,2,4,7,4,2,0,-1,1,3,5,7,5,3,1,-1,0,2,4,7,9,7,4,2,3,2,1,2,0,-1,-1,-1],st:.2,w:'triangle',v:.05,b:4},
 /* daniel: dark slow harmonic minor in the den */
 daniel: {s:scl(130.81,[0,2,3,5,7,8,11,12]),
          p:[0,-1,2,-1,3,-1,-1,-1,5,-1,4,-1,3,-1,-1,-1,0,-1,2,-1,7,-1,-1,-1,5,-1,3,-1,2,-1,-1,-1],st:.36,w:'triangle',v:.055,b:8},
 /* peter: flowing lydian over the water */
 peter:  {s:scl(233.08,[0,2,4,6,7,9,11,12]),
          p:[0,2,4,6,4,2,0,2,4,6,7,6,4,2,0,-1,1,3,4,6,4,3,1,-1,0,2,4,7,6,4,2,-1],st:.24,w:'triangle',v:.045,b:8},
 /* elijah: a solemn building phrygian-dominant, mounting toward the fire */
 elijah: {s:scl(174.61,[0,1,4,5,7,8,11,12]),
          p:[0,-1,0,1,0,-1,4,-1,5,4,0,-1,7,-1,5,4,0,0,4,0,5,4,7,5,8,7,5,4,7,-1,-1,-1],st:.26,w:'triangle',v:.05,b:8},
 /* joyful bright major — Joshua's Praise Break */
 praise: {s:scl(392,[0,2,4,5,7,9,11,12]),
          p:[0,4,2,4,5,7,5,4,2,7,5,4,0,4,7,4,5,9,7,5,4,7,5,4,0,4,7,9,7,4,2,0],st:.15,w:'square',v:.05,b:4}
};
let musicOverride=null; /* {track,speed} — a story may temporarily seize the music (e.g. Joshua's praise break) */
function musicTick(){
 if(!AC||!musicOn){if(AC)mNext=AC.currentTime;return;}
 let key='';
 if(screen==='menu'||screen==='intro')key='menu';
 else if((screen==='game'||screen==='pause')&&story)key=story.id;
 if(!key){mNext=AC.currentTime;return;}
 /* tempo by difficulty: EASY as-is, NORMAL +25% faster, HARD twice as fast as EASY (menu stays steady) */
 let tempo=1;
 if(key!=='menu')tempo=[1,0.8,0.5][dsel];
 let tr=TRACKS[key];
 if(musicOverride&&key!=='menu'){tr=TRACKS[musicOverride.track]||tr;tempo*=musicOverride.speed;key='ovr:'+musicOverride.track;}
 if(key!==mKey){mKey=key;mStep=0;mNext=AC.currentTime+.05;}
 const st=tr.st*tempo;
 while(mNext<AC.currentTime+.25){const i=tr.p[mStep%tr.p.length],w=Math.max(0,mNext-AC.currentTime);
  if(i>=0)tone(tr.s[i%8],st*.92,tr.w,tr.v,0,w);
  if(mStep%tr.b===0)tone(tr.s[0]/2,st*3.2,'sine',.04,0,w);
  mNext+=st;mStep++;}
}

/* ============ DRAW HELPERS (16-bit: gradients, glow, outlines) ============ */
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function vgrad(x,y,w,h,stops){const g=ctx.createLinearGradient(0,y,0,y+h);
 for(const s of stops)g.addColorStop(s[0],s[1]);ctx.fillStyle=g;ctx.fillRect(x,y,w,h);}
function glow(x,y,r,col,a){const g=ctx.createRadialGradient(x,y,0,x,y,r);
 g.addColorStop(0,col.replace(')',','+a+')').replace('rgb','rgba'));
 g.addColorStop(1,col.replace(')',',0)').replace('rgb','rgba'));
 ctx.fillStyle=g;ctx.fillRect(x-r,y-r,r*2,r*2);}
function rrect(x,y,w,h,r,fill,stroke,lw){ctx.beginPath();
 ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
 ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
 if(fill){ctx.fillStyle=fill;ctx.fill();}
 if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke();}}
function text(str,x,y,c,size,align,noShadow){ctx.font=(size||7)+'px Georgia, serif';
 ctx.textAlign=align||'left';ctx.textBaseline='top';
 if(!noShadow){ctx.fillStyle='rgba(10,8,4,.75)';ctx.fillText(str,x+.6,y+.7);}
 ctx.fillStyle=c||C.parch;ctx.fillText(str,x,y);}
function wrap(str,maxChars){const words=str.split(' '),lines=[];let cur='';
 for(const w2 of words){if((cur+' '+w2).trim().length>maxChars){lines.push(cur.trim());cur=w2;}else cur+=' '+w2;}
 if(cur.trim())lines.push(cur.trim());return lines;}
function bar(x,y,w,frac,c){rrect(x,y,w,5.5,2.5,'rgba(12,10,6,.8)',C.gold,.7);
 const f=clamp(frac,0,1);if(f>0){const g=ctx.createLinearGradient(x,y,x,y+5);
 g.addColorStop(0,shade(c,.35));g.addColorStop(1,c);
 ctx.fillStyle=g;ctx.beginPath();ctx.roundRect?ctx.roundRect(x+1,y+1,(w-2)*f,3.5,1.6):ctx.rect(x+1,y+1,(w-2)*f,3.5);ctx.fill();}}
function hearts(n){rrect(3.5,2.5,5+n*10,10.5,3,'rgba(12,9,5,.55)','rgba(240,181,65,.35)',.8);
 for(let i=0;i<n;i++){const x=7+i*10,y=5;
 ctx.fillStyle='#d84848';ctx.beginPath();
 ctx.arc(x+1.6,y+1.4,1.8,0,7);ctx.arc(x+4.4,y+1.4,1.8,0,7);
 ctx.moveTo(x-.2,y+2);ctx.lineTo(x+3,y+6.4);ctx.lineTo(x+6.2,y+2);ctx.closePath();ctx.fill();
 ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(x+.8,y+.6,1.2,1.2);}}
let shakeT=0,shakeAmt=0;
function shake(a,t){shakeAmt=a;shakeT=t;}
function vignette(){const g=ctx.createRadialGradient(W/2,H/2,H*.55,W/2,H/2,H*1.0);
 g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.32)');
 ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
/* a leafy tree with a solid, gap-free canopy — trunk base sits at (bx,by) */
function drawTree(bx,by){const cxT=bx,cy=by-19;
 ctx.fillStyle='rgba(16,10,4,.28)';ctx.beginPath();ctx.ellipse(cxT,by+1,12,2.6,0,0,7);ctx.fill(); /* ground shadow */
 /* tapered trunk */
 vgrad(bx-2,by-17,4,17,[[0,'#7a5230'],[1,'#4e3418']]);px(bx+1,by-17,1,17,'rgba(255,220,160,.12)');
 px(bx-3,by-7,2,3,'#5e3c1c');px(bx+2,by-11,2,3,'#5e3c1c'); /* root/branch stubs */
 /* SOLID canopy blob first (no gaps), then shading on top */
 ctx.fillStyle='#3a6630';ctx.beginPath();ctx.ellipse(cxT,cy+2,13,10,0,0,7);ctx.fill();
 ctx.beginPath();ctx.ellipse(cxT,cy-3,10,8,0,0,7);ctx.fill();
 ctx.fillStyle='#4f8438';ctx.beginPath();
 ctx.arc(cxT-6,cy+1,6,0,7);ctx.arc(cxT,cy-1,7,0,7);ctx.arc(cxT+6,cy+1,6,0,7);ctx.arc(cxT+2,cy-5,5.5,0,7);ctx.fill();
 ctx.fillStyle='#66a24a';ctx.beginPath();
 ctx.arc(cxT-3,cy-2,4.5,0,7);ctx.arc(cxT+3,cy-1,4,0,7);ctx.arc(cxT,cy-6,3.6,0,7);ctx.fill();
 ctx.fillStyle='rgba(150,200,110,.6)';ctx.beginPath();ctx.arc(cxT-2,cy-5,2.4,0,7);ctx.arc(cxT+3,cy-3,1.8,0,7);ctx.fill();
 srand(bx*7+by);for(let d=0;d<5;d++)px(cxT-9+((rnd()*18)|0),cy-6+((rnd()*12)|0),1.4,1.4,'#f0c860');} /* fruit */
/* SNES-style robed figure: outlined + shaded, swinging arms, sash and hem — same 8x12 footprint */
function dude(x,y,o){o=o||{};const f=(o.f|0)%2,skin=o.skin||C.skin,robe=o.robe||C.clay,lc='#3a2414';
 ctx.fillStyle='rgba(16,10,4,.28)';ctx.beginPath();ctx.ellipse(x+4,y+12,4.4,1.3,0,0,7);ctx.fill(); /* soft ground shadow */
 if(o.head){px(x+1,y-1,6,2,o.head);px(x+1,y+1,1,4,o.head);px(x+6,y+1,1,4,o.head);
  px(x+1,y-1,6,.7,shade(o.head,.3));px(x+1,y+.6,6,.6,shade(o.head,-.3));}
 else if(o.hair){px(x+1.5,y-1,5,1.8,o.hair);px(x+1.5,y-1,5,.7,shade(o.hair,.25));}

/* ============ DIALOGUE SYSTEM (in-game prompts & cues) ============ */
const dlg={q:[],cur:null,chars:0,done:null};
function sayD(lines,done){dlg.q=lines.slice();dlg.done=done||null;dlgNext();}
function dlgNext(){if(!dlg.q.length){dlg.cur=null;const f=dlg.done;dlg.done=null;if(f)f();return;}
 dlg.cur=dlg.q.shift();dlg.chars=0;sfx.talk();}
function dlgUpdate(dt){if(!dlg.cur)return;
 const full=dlg.cur.txt;
 if(dlg.chars<full.length)dlg.chars+=dt*52;
 if(edge.action||tap()){if(dlg.chars<full.length)dlg.chars=full.length;else dlgNext();}}
function dlgDraw(){if(!dlg.cur)return;
 const bh=52,by=H-bh-6;
 ctx.fillStyle='rgba(8,6,3,.45)';ctx.fillRect(0,0,W,H);
 rrect(8,by,W-16,bh,5,'rgba(24,18,10,.96)','#8a6a34',1.2);
 rrect(9.5,by+1.5,W-19,bh-3,4,null,'rgba(240,181,65,.25)',.7);
 text(dlg.cur.who,16,by+6,C.gold,7.5);
 const shown=dlg.cur.txt.slice(0,Math.floor(dlg.chars));
 let y=by+17;for(const ln of wrap(shown,62)){text(ln,16,y,C.parch,7);y+=9;}
 if(dlg.chars>=dlg.cur.txt.length){
  if(dlg.cur.ref)text('— '+dlg.cur.ref,W-18,by+bh-11,C.dsand,6,'right');
  if(Math.sin(tGlobal*5)>0)text('A \u25b8',W-18,by+6,C.gold,7,'right');}}

function menuUpdate(){
 if(menuFocus==='diff'){
  if(edge.up){dsel=(dsel+2)%3;sfx.step();}
  if(edge.down){dsel=(dsel+1)%3;sfx.step();}
  if(edge.right||edge.action){menuFocus='cards';sfx.step();}
 }else{
  if(edge.left)selIdx=(selIdx+7)%8,sfx.step();
  if(edge.right)selIdx=(selIdx+1)%8,sfx.step();
  if(edge.up){if(selIdx<4){menuFocus='diff';sfx.step();}else{selIdx-=4;sfx.step();}}
  if(edge.down){if(selIdx<4){selIdx+=4;sfx.step();}}
  if(edge.action)startStory(STORIES[selIdx]);
 }
 if(clickPt){
  /* music toggle button (below the moon) */
  if(clickPt.x>=42&&clickPt.x<58&&clickPt.y>=4&&clickPt.y<15){musicOn=!musicOn;sfx.step();clickPt=null;return;}
  for(let i=0;i<3;i++){const bx=4,by=4+i*13;
   if(clickPt.x>=bx&&clickPt.x<bx+34&&clickPt.y>=by&&clickPt.y<by+11){dsel=i;menuFocus='diff';sfx.step();clickPt=null;return;}}
  for(let i=0;i<8;i++){const cx=8+(i%4)*77,cy2=i<4?48:108;
   if(clickPt.x>=cx&&clickPt.x<cx+72&&clickPt.y>=cy2&&clickPt.y<cy2+54){
    menuFocus='cards';
    if(selIdx===i)startStory(STORIES[i]);else{selIdx=i;sfx.step();}
    clickPt=null;break;}}}
}

/* ============ GAME 1: ABRAHAM (Genesis 22) ============ */
function makeAbraham(){
 const LEN=1300;
 const segs=[];let sx=0,sy=158;
 srand(77);
 while(sx<LEN){const w=70+rnd()*90;segs.push({x0:sx,x1:sx+w,y:sy});
  sx+=w+(sx>140&&sx<LEN-160?16+rnd()*14:0);sy-=8+rnd()*8;}
 const last=segs[segs.length-1];
 const endX=Math.min(last.x1,LEN+40);          // fix: altar always reachable
 const altarX=endX-26,topY=last.y,thickX=Math.max(last.x0+16,altarX-58);
 const p={x:20,y:0,vy:0,on:true};
 let hp=D().hearts,f=0,inv=0,phase=0,haveRam=false,fireT=0,asked=false,fellMsg=0;
 const trail=makeTrail(p.x,p.y);
 let rocks=[],rockT=2.6;
 function groundAt(x){for(const s2 of segs)if(x>=s2.x0&&x<=s2.x1)return s2.y;return 999;}
 function segAt(x){for(const s2 of segs)if(x>=s2.x0&&x<=s2.x1)return s2;return null;}
 p.y=groundAt(20)-12;
 return{
 update(dt){
  f+=dt*7;inv=Math.max(0,inv-dt);fellMsg=Math.max(0,fellMsg-dt);
  const prog=clamp(p.x/altarX,0,1);
  if(phase>=1){ /* summit: take the ram, present the sacrifice */
   const spd=52;
   if(keys.left)p.x-=spd*dt;if(keys.right)p.x+=spd*dt;
   p.x=clamp(p.x,last.x0+6,endX);p.y=topY-12;
   if(phase===1&&!haveRam&&Math.abs(p.x-thickX)<10&&edge.action){
    haveRam=true;sfx.pick();phase=2;
    sayD([{who:'THE SCROLL',txt:'And Abraham went and took the ram, and offered him up for a burnt offering in the stead of his son.',ref:'Genesis 22:13'}]);}
   if(phase===2&&haveRam&&Math.abs(p.x-(altarX-4))<9&&edge.action){
    phase=3;fireT=0;sfx.blast();
    sayD([{who:'ABRAHAM',txt:'Jehovah Jireh: in the mount of the LORD it shall be seen.',ref:'Genesis 22:14'}]);}
   if(phase===3){fireT+=dt;if(fireT>2.2)gameWin();}
   return;}
  const spd=56;
  if(keys.left)p.x-=spd*dt;if(keys.right)p.x+=spd*dt;p.x=clamp(p.x,4,endX);
  /* small steps auto-climb; deep ledges are solid cliff faces (no snap out of a cleft) */
  const sIn=segAt(p.x+4);
  if(sIn){const top=sIn.y-12;
   if(p.y>top+14)p.x=sIn.x0-4.5;
   else if(p.on&&p.y>top)p.y=top;}
  const g=groundAt(p.x+4);
  if(p.on&&(edge.up||edge.action)){p.vy=-134;p.on=false;sfx.step();}
  p.vy+=300*dt;p.y+=p.vy*dt;
  if(g<900&&p.vy>=0&&p.y>=g-12&&p.y<=g-12+8){p.y=g-12;p.vy=0;p.on=true;}
  else if(g>=900||p.y<g-12-0.5)p.on=false;
  if(p.y>H+12){ /* fell in a cleft: clear feedback + respawn BEFORE the gap */
   hp--;sfx.splash();sfx.hit();shake(3,.5);fellMsg=1.8;
   if(hp<=0)return gameLose('"...he fell..." — into the cleft of the mount. '+story.loseVerse);
   let back=segs[0];for(const s2 of segs){if(s2.x1<=p.x+6)back=s2;else break;}
   p.x=Math.max(back.x0+6,back.x1-16);p.y=back.y-12;p.vy=0;inv=1.6;}
  trail.push(p.x,p.y);
  if(!asked&&prog>.42){asked=true;
   sayD([{who:'ISAAC',txt:'My father... Behold the fire and the wood: but where is the lamb for a burnt offering?',ref:'Genesis 22:7'},
    {who:'ABRAHAM',txt:'My son, God will provide himself a lamb for a burnt offering.',ref:'Genesis 22:8'}]);}
  /* bounding stones: rollers (leap them) and bounders (pass under) — rate ramps near the summit */
  rockT-=dt;
  if(rockT<=0&&p.x<altarX-70){rockT=HARD()?(.5+Math.random()*.4):(2.5+Math.random()*1.5)/(ramp(prog)*D().enemy);
   const bound=Math.random()<.5;
   rocks.push({x:p.x+185,y:groundAt(p.x+185)-40,vx:-(46+Math.random()*10),vy:0,b:bound});}
  for(const r of rocks){r.vx-=5*dt;r.x+=r.vx*dt;const rg=groundAt(r.x);
   r.vy+=280*dt;r.y+=r.vy*dt;
   if(rg<900&&r.y>rg-5){r.y=rg-5;r.vy=r.b?-172:-58;if(Math.abs(r.x-p.x)<80)sfx.step();}
   if(inv<=0&&dist(r.x,r.y,p.x+4,p.y+6)<8){hp--;inv=1.4;sfx.hit();shake(2.5,.4);
    if(hp<=0)return gameLose(story.loseVerse);}}
  rocks=rocks.filter(r=>r.x>p.x-200&&r.y<H+60);
  if(p.x>=altarX-8){phase=1;sfx.angel();
   sayD([{who:'ANGEL OF THE LORD',txt:'Abraham, Abraham... Lay not thine hand upon the lad, neither do thou any thing unto him: for now I know that thou fearest God.',ref:'Genesis 22:11-12'},
    {who:'THE SCROLL',txt:'And Abraham lifted up his eyes, and looked, and behold behind him a ram caught in a thicket by his horns.',ref:'Genesis 22:13'}]);}
 },
 draw(){
  const cx=clamp(p.x-80,0,endX+60-W);
  vgrad(0,0,W,H,[[0,'#8fb8dc'],[.5,'#c3d8e8'],[1,'#e2d8c2']]);
  glow(46-cx*.15,20,30,'rgb(255,240,200)',.55);

  /* terrain */

   vgrad(x0,s2.y,x1-x0,H-s2.y,[[0,'#9c8460'],[.15,'#8a7454'],[1,'#5e4c38']]);
   px(x0,s2.y,x1-x0,2.4,'#b5a078');
   srand(s2.x0);for(let i=0;i<8;i++)px(x0+rnd()*(x1-x0),s2.y+4+rnd()*24,2,2,'rgba(90,72,52,.7)');}
  /* thicket + ram */
  if(phase>=1){const tx2=thickX-cx;
   px(tx2-7,topY-9,22,9,'#4a6a2e');px(tx2-4,topY-12,16,5,'#5e8a3c');px(tx2-4,topY-12,16,1.6,'#79a852');
   if(!haveRam){ramDraw(tx2,topY-9);
    if(Math.abs(p.x-thickX)<12&&!dlg.cur)text('A — TAKE THE RAM',tx2-12,topY-26,C.gold,7);}}
  /* altar */
  const ax=altarX-cx;
  vgrad(ax,topY-11,24,11,[[0,'#a8a49e'],[1,'#6e6a62']]);px(ax+2,topY-14,20,3,'#b8b4ac');
  for(let i=0;i<4;i++)px(ax+4+i*4.5,topY-17,3,3,C.wood);
  if(phase===3){glow(ax+12,topY-20,26,'rgb(255,150,50)',.6);
   for(let i=0;i<5;i++){const fh=6+Math.sin(tGlobal*9+i*2)*3;
    px(ax+5+i*3.4,topY-16-fh,2.6,fh,i%2?'#ff9a30':'#ffd070');}}
  else if(phase===2&&haveRam&&Math.abs(p.x-(altarX-4))<12&&!dlg.cur)text('A — PRESENT THE SACRIFICE',ax-24,topY-30,C.gold,7);
  /* Isaac */
  if(phase===0){const tp=trail.get(16);dude(tp.x-cx,tp.y+2,{robe:C.sand,hair:'#3a2a1a',f:f,skin:'#e0a875'});
   px(tp.x-cx+1,tp.y+3,6,2,C.wood);}
  else dude(altarX-38-cx,topY-12,{robe:C.sand,hair:'#3a2a1a',f:0,skin:'#e0a875'});
  /* Abraham */
  if(inv<=0||Math.sin(tGlobal*20)>0)
   dude(p.x-cx,p.y,{robe:C.wood,trim:C.gold,head:C.parch,beard:'#c9c2b4',bl:2,f:p.on?f:1,staff:phase===0,ram:haveRam&&phase===2});
  for(const r of rocks){const rx=r.x-cx;
   ctx.fillStyle='rgba(20,14,8,.4)';const gy=groundAt(r.x);if(gy<900)ctx.fillRect(rx-3,gy-2,7,2);
   const gr=ctx.createRadialGradient(rx-1,r.y-4,1,rx,r.y-3,5);gr.addColorStop(0,'#b8b4ac');gr.addColorStop(1,r.b?'#7a736a':'#8a8680');

  if(phase===1&&!dlg.cur)angelDraw(ax-8,topY-50+Math.sin(tGlobal*2)*3,tGlobal);

 }};

/* ============ GAME 2: NOAH (Genesis 6-7) ============ */
function makeNoah(){
 const TYPES=[['sheep',C.parch],['lion',C.dsand],['camel','#b4854a'],['ox','#6e4a2e'],['elephant','#9298a0'],['giraffe','#d8a850']];
 const p={x:40,y:100};let f=0;
 const trail=makeTrail(p.x,p.y);
 const animals=[];
 srand(99);
 for(let t=0;t<6;t++)for(let k=0;k<2;k++)
  animals.push({type:t,x:20+rnd()*180,y:52+rnd()*110,wt:rnd()*2,wx:0,wy:0,follow:-1,inArk:false});
 let chain=[],inCount=0,T=0,done=false,doneT=0,thT=6,opened=false;
 let lastDodges=2+((Math.random()*4)|0); /* HARD: the last beast slips the hand 2-5 times before it may be caught */
 let entering=[],noahIn=false,closeT=0; /* animals climbing the ramp, Noah vanished inside, and the door-closing animation */
 /* the ramp runs from the ark door down-left to the ground */
 const DOOR={x:244,y:117},RAMP={x0:210,y0:150,x1:244,y1:117}; /* foot -> door */
 const TOTAL=80*D().timer;
 function beastDraw(b,fr){const col=TYPES[b.type][1],nm=TYPES[b.type][0];
  /* relative sizes: sheep < lion < camel = ox < giraffe < elephant */
  const SC={sheep:1,lion:1.12,camel:1.24,ox:1.24,giraffe:1,elephant:1.42}[nm]||1;
  ctx.save();ctx.translate(b.x+4,b.y+6);ctx.scale(SC,SC);ctx.translate(-(b.x+4),-(b.y+6));
  beastBody(b,fr,col,nm);
  ctx.restore();}
 function beastBody(b,fr,col,nm){
  ctx.fillStyle='rgba(16,10,4,.3)';ctx.fillRect(b.x-1,b.y+5,11,2);
  if(nm==='giraffe'){ /* tall neck, ossicones, snout, spots */
   ctx.fillStyle='rgba(16,10,4,.3)';ctx.fillRect(b.x,b.y+5,9,2);
   px(b.x+1,b.y+1,7,5,col);px(b.x+1,b.y+1,7,1.3,shade(col,.2)); /* body */
   px(b.x+6,b.y-8,2.4,9,col); /* long neck */
   px(b.x+5,b.y-13,4,4,col); /* head */
   px(b.x+8,b.y-12,3,2.4,shade(col,.08)); /* snout / muzzle jutting forward */
   px(b.x+10,b.y-11,1,1,shade(col,-.4)); /* nostril */
   px(b.x+7,b.y-12,1,1,C.ink); /* eye */
   px(b.x+5,b.y-15,1,2,'#5e3c1c');px(b.x+7.5,b.y-15,1,2,'#5e3c1c'); /* ossicones */
   px(b.x+4.6,b.y-16,1.8,1.2,'#3a2a18');px(b.x+7.1,b.y-16,1.8,1.2,'#3a2a18'); /* knobs atop ossicones */
   px(b.x+2,b.y+2,1.4,1.4,shade(col,-.35));px(b.x+4.5,b.y+3,1.4,1.4,shade(col,-.35));px(b.x+6,b.y-5,1.2,1.2,shade(col,-.35)); /* spots */
   px(b.x+2,b.y+5,1,2+fr,col);px(b.x+6,b.y+5,1,3-fr,col);return;}
  if(nm==='elephant'){ /* bulky body, big ear, trunk, tusk */
   ctx.fillStyle='rgba(16,10,4,.3)';ctx.fillRect(b.x-1,b.y+5,13,2);
   px(b.x,b.y-1,11,7,col);px(b.x,b.y-1,11,1.4,shade(col,.18)); /* body */
   px(b.x+9,b.y-3,4,5,col); /* head */
   ctx.fillStyle=shade(col,-.12);ctx.beginPath();ctx.arc(b.x+9,b.y,3,0,7);ctx.fill(); /* ear */
   px(b.x+12,b.y,1.6,5+fr,col); /* trunk */
   px(b.x+11,b.y+4,2,1,'#e8e2d0'); /* tusk */
   px(b.x+11,b.y-2,1,1,C.ink);
   px(b.x+1,b.y+5,1.6,2+fr,col);px(b.x+4,b.y+5,1.6,3-fr,col);px(b.x+7,b.y+5,1.6,2+fr,col);return;}
  if(nm==='lion'){lionDraw(b.x,b.y-4,fr,false);return;}
  if(nm==='ox'){ /* sturdy ox — compact body, modest horns */
   ctx.fillStyle='rgba(16,10,4,.3)';ctx.fillRect(b.x-1,b.y+4,10,2);
   px(b.x,b.y-1,8,6,col);px(b.x,b.y-1,8,1.3,shade(col,.18)); /* body */
   px(b.x,b.y-3,3,3,shade(col,-.1)); /* shoulder hump */
   px(b.x+6,b.y-2,4,4,col); /* head */
   /* horns sweeping out and up */
   ctx.strokeStyle='#e8ddc4';ctx.lineWidth=1.3;ctx.lineCap='round';
   ctx.beginPath();ctx.moveTo(b.x+7,b.y-2);ctx.quadraticCurveTo(b.x+5.5,b.y-4.5,b.x+7,b.y-6);ctx.stroke();  /* left horn */
   ctx.beginPath();ctx.moveTo(b.x+9,b.y-2);ctx.quadraticCurveTo(b.x+10.5,b.y-4.5,b.x+9,b.y-6);ctx.stroke(); /* right horn */
   ctx.lineCap='butt';

/* ============ GAME 4: JOSHUA (Joshua 6) — four-walled city, corner towers ============ */
function makeJoshua(){

 return{
 update(dt){

   const dl=p.x-(cW.x-mX-1),dr=(cW.x+cW.w+1)-p.x,dtp=p.y-(cW.y-mTop-1),db=(cW.y+cW.h+mBot)-p.y;
   const m=Math.min(dl,dr,dtp,db);

   /* place it clear of the city walls: keep a good margin around the castle box */
   const pad=26,L=cW.x-pad,R=cW.x+cW.w+pad,Tp=cW.y-pad-6,B=cW.y+cW.h+pad;

  const ang=Math.atan2(p.y-cy0,p.x-cx0);

  if(Math.abs(acc)>=Math.PI*2){laps++;acc=0;sfx.trumpet();}
  if(laps>=7&&edge.action&&!dlg.cur){
   sayD([{who:'JOSHUA',txt:'Shout; for the LORD hath given you the city!',ref:'Joshua 6:16'}],()=>{

    srand(9);for(let i=0;i<34;i++)rubble.push({x:cW.x-6+rnd()*(cW.w+12),y:cW.y-8+rnd()*(cW.h+10),

   return;}
  /* arrows from the nearest corner tower — quicker with every circuit; on HARD the two nearest towers loose together */
  shootT-=dt;
  if(shootT<=0){shootT=(1.9+Math.random()*1.1)/(ramp(laps/7)*D().enemy);
   const ts2=towers.slice().sort((a,b)=>dist(a[0],a[1],p.x,p.y)-dist(b[0],b[1],p.x,p.y));
   const nsh=HARD()?(laps>=6?4:2):1; /* on the last circuit of HARD the volleys double */

   if(inv<=0&&dist(a.x,a.y,p.x+4,p.y+6)<6){hp--;inv=1.2;a.dead=true;sfx.hit();shake(2,.3);
    if(hp<=0)return gameLose(story.loseVerse);}}
  arrows=arrows.filter(a=>!a.dead&&a.x>0&&a.x<W&&a.y>0&&a.y<H);
 },
 draw(){

/* ============ GAME 5: GIDEON (Judges 7) — graded detection ============ */
function makeGideon(){
 const p={x:20,y:160};let f=0,opened=false;
 const tents=[{x:120,y:72},{x:170,y:92},{x:140,y:116},{x:200,y:66},{x:210,y:112},{x:165,y:58}];
 const marks=[{x:70,y:64,done:false},{x:160,y:56,done:false},{x:262,y:82,done:false}];
 const blowSpot={x:22,y:150}; /* to the far left Gideon goes to sound the trumpet */
 /* the watch roams the whole camp — three by night on the easy watch, four otherwise */
 const guards=[];
 const NG=dsel===0?3:4;
 for(let i=0;i<NG;i++){const sx=40+i*66,sy=60+(i%2)*70;
  guards.push({x:sx,y:sy,tx:sx,ty:sy,fx:1,fy:0,repath:Math.random()*1.5});}
 let placed=0,finale=false,finT=0,plant=0,alarm=0,seenNow=false,readyBlow=false,host=[],foes=[];
 function blocked(x1,y1,x2,y2){
  for(const t2 of tents){const mx=t2.x+9,my=t2.y+6;
   const L=dist(x1,y1,x2,y2);if(L<1)continue;
   const t3=clamp(((mx-x1)*(x2-x1)+(my-y1)*(y2-y1))/(L*L),0,1);
   if(dist(x1+(x2-x1)*t3,y1+(y2-y1)*t3,mx,my)<10)return true;}
  return false;}
 return{
 update(dt){
  f+=dt*6;
  if(!opened){opened=true;
   sayD([{who:'GIDEON',txt:'Look on me, and do likewise... When I blow with a trumpet, I and all that are with me, then blow ye the trumpets also on every side of all the camp.',ref:'Judges 7:17-18'}]);}
  if(finale){finT+=dt;
   /* Gideon's three hundred storm in from the left; the host of Midian flees before them to the right */
   for(const h of host){h.x+=(70+h.sp)*dt;h.wob=Math.sin(finT*8+h.ph)*2;}
   for(const fo of foes){fo.x+=(58+fo.sp)*dt;fo.wob=Math.sin(finT*10+fo.ph)*2.5;}
   if(finT>4.2)gameWin();return;}
  const spd=58;let mv=false;
  if(keys.left){p.x-=spd*dt;mv=true}if(keys.right){p.x+=spd*dt;mv=true}
  if(keys.up){p.y-=spd*dt;mv=true}if(keys.down){p.y+=spd*dt;mv=true}
  p.x=clamp(p.x,8,304);p.y=clamp(p.y,18,166);
  /* the watch grows keener with every company set */
  const coneR=46+placed*7,gspd=24*(1+placed*.22)*D().enemy;
  seenNow=false;let seenRate=0;
  for(const g2 of guards){
   /* roam the camp: on reaching a target (or timeout) pick a NEW one a good distance away, so the watch never jitters in place */
   g2.repath-=dt;
   const d0=dist(g2.x,g2.y,g2.tx,g2.ty);
   if(d0<6||g2.repath<=0){
    let nx,ny,tries=0;
    do{nx=30+Math.random()*250;ny=52+Math.random()*106;tries++;}
    while(dist(nx,ny,g2.x,g2.y)<70&&tries<12); /* the new post must be well away */
    g2.tx=nx;g2.ty=ny;g2.repath=2.2+Math.random()*2.5;}
   const d=dist(g2.x,g2.y,g2.tx,g2.ty)||1;
   g2.x+=(g2.tx-g2.x)/d*gspd*dt;g2.y+=(g2.ty-g2.y)/d*gspd*dt;
   g2.fx=(g2.tx-g2.x)/d;g2.fy=(g2.ty-g2.y)/d;
   g2.r=coneR;g2.sees=false;
   const dd=dist(g2.x,g2.y,p.x+4,p.y+6);
   if(dd<coneR){const dot=((p.x+4-g2.x)*g2.fx+(p.y+6-g2.y)*g2.fy)/(dd||1);
    if((dot>.72||dd<14)&&!blocked(g2.x,g2.y,p.x+4,p.y+6)){
     g2.sees=true;seenNow=true;
     seenRate+=(1.5-dd/coneR); /* nearer & longer in the light = faster alarm */
    }}}
  if(seenNow)alarm=clamp(alarm+dt*.55*seenRate*D().enemy*(HARD()?1.5:1),0,1);
  else alarm=Math.max(0,alarm-dt*(HARD()?.15:.38));
  if(alarm>=1)return gameLose(story.loseVerse);
  const m=marks.find(m2=>!m2.done&&dist(p.x+4,p.y+6,m2.x,m2.y)<11);
  if(m&&keys.action&&!mv){plant+=dt;
   if(plant>=1.2){m.done=true;placed++;plant=0;sfx.pick();}}
  else plant=0;
  /* once all three companies are set, hasten to the trumpet post at the far left and blow */
  readyBlow=placed>=3&&dist(p.x+4,p.y+6,blowSpot.x,blowSpot.y)<14;
  if(readyBlow&&edge.action&&!dlg.cur){
   /* the three hundred appear at the left and charge across; the camp of Midian is set to flight */
   host=[];for(let i=0;i<26;i++)host.push({x:-90+Math.random()*80,y:52+Math.random()*106,ph:Math.random()*6,sp:Math.random()*40,wob:0});
   foes=[];
   for(const g2 of guards)foes.push({x:g2.x,y:g2.y,ph:Math.random()*6,sp:Math.random()*40,wob:0});
   for(let i=0;i<18;i++)foes.push({x:110+Math.random()*160,y:52+Math.random()*106,ph:Math.random()*6,sp:Math.random()*40,wob:0});
   sayD([{who:'THE THREE HUNDRED',txt:'The sword of the LORD, and of Gideon!',ref:'Judges 7:20'}],()=>{
    finale=true;finT=0;sfx.blast();sfx.trumpet();noiseSfx(.4,.32,2400);shake(3,.6);});}

  if(phase===2&&!dlg.cur)text('\u25b8 RUN TO THE PHILISTINE \u25b8',W/2,30,Math.sin(tGlobal*6)>0?C.gold:C.dsand,8,'center');
  if(phase===3)text('"...they fled." 17:51',W/2,30,C.gold,8,'center');
 }};
}

/* ============ GAME 7: DANIEL (Daniel 6) ============ */
function makeDaniel(){
 const p={x:160,y:140};let f=0,opened=false;
 const spots=[{x:60,y:34,done:false},{x:160,y:34,done:false},{x:260,y:34,done:false}];
 const NL=dsel===0?3:4;
 const lions=[];for(let i=0;i<NL;i++)lions.push({x:60+i*60,y:80+(i%2)*40,tx:0,ty:0,t:0});
 let praying=0,prayed=0,angelT=0,safe=false,roarT=2;
 return{
 update(dt){
  f+=dt*6;
  if(!opened){opened=true;
   sayD([{who:'KING DARIUS',txt:'Thy God whom thou servest continually, he will deliver thee.',ref:'Daniel 6:16'}]);}
  if(safe){angelT+=dt;if(angelT>2.6)gameWin();return;}
  const spd=58;let mv=false;
  const atSpot=spots.find(s2=>!s2.done&&dist(p.x,p.y,s2.x,s2.y+14)<11);
  if(keys.left){p.x-=spd*dt;mv=true}if(keys.right){p.x+=spd*dt;mv=true}
  if(keys.up){p.y-=spd*dt;mv=true}if(keys.down){p.y+=spd*dt;mv=true}
  p.x=clamp(p.x,20,292);p.y=clamp(p.y,48,156);
  if(atSpot&&keys.action&&!mv){praying+=dt;
   if(praying>=1.6){atSpot.done=true;prayed++;praying=0;sfx.pray();
    if(prayed>=3){safe=true;sfx.angel();
     sayD([{who:'DANIEL',txt:'My God hath sent his angel, and hath shut the lions\u2019 mouths, that they have not hurt me.',ref:'Daniel 6:22'}]);}}}
  else praying=0;
  roarT-=dt;
  /* lions grow bolder with every prayer */
  const lspd=30*D().enemy*(1+prayed*.3),bias=.4+prayed*.15;
  for(const L of lions){L.t-=dt;
   if(HARD()&&praying>0){ /* they come at him as he prays — but shrink back as the prayer is nearly heard */
    if(praying>1.05){const dp=dist(L.x,L.y,p.x,p.y)||1;
     L.tx=clamp(L.x+(L.x-p.x)/dp*80,30,290);L.ty=clamp(L.y+(L.y-p.y)/dp*80,55,150);L.t=Math.min(L.t,.15);}
    else{L.tx=p.x;L.ty=p.y;L.t=Math.min(L.t,.15);}}
   if(L.t<=0){L.t=(1.5+Math.random()*2)/(1+prayed*.25);
    if(Math.random()<bias){L.tx=p.x;L.ty=p.y;}else{L.tx=30+Math.random()*260;L.ty=55+Math.random()*95;}}
   const d=dist(L.x,L.y,L.tx,L.ty);
   if(d>4){L.x+=(L.tx-L.x)/d*lspd*dt;L.y+=(L.ty-L.y)/d*lspd*dt;}
   if(dist(L.x+6,L.y+5,p.x+4,p.y+6)<10)return gameLose(story.loseVerse);
   if(roarT<=0&&dist(L.x,L.y,p.x,p.y)<60){sfx.roar();shake(1.5,.3);roarT=3+Math.random()*3;}}
 },
 draw(){
  vgrad(0,0,W,H,[[0,'#100c1c'],[1,'#181226']]);
  for(let y=46;y<H;y+=10)for(let x=12+((y/10)%2)*8;x<308;x+=16){
   px(x,y,15,9,'#282234');px(x,y,15,1.4,'rgba(90,80,110,.4)');}
  vgrad(0,0,W,44,[[0,'#443c56'],[1,'#342e44']]);
  px(0,0,12,H,'#3a3448');px(308,0,12,H,'#3a3448');px(0,H-6,W,6,'#3a3448');
  for(let x=0;x<W;x+=14)px(x,40,13,3,'#2a2436');
  for(const s2 of spots){
   px(s2.x-6,6,12,26,s2.done?'#1a1c3a':'#0c0e22');
   px(s2.x-1,2,2,2,C.parch);
   if(!s2.done){const mg=ctx.createLinearGradient(0,32,0,60);
    mg.addColorStop(0,'rgba(200,215,255,.16)');mg.addColorStop(1,'rgba(200,215,255,0)');
    ctx.fillStyle=mg;ctx.beginPath();
    ctx.moveTo(s2.x-6,32);ctx.lineTo(s2.x+6,32);ctx.lineTo(s2.x+16,58);ctx.lineTo(s2.x-16,58);ctx.closePath();ctx.fill();
    if(Math.sin(tGlobal*4)>0)text('A',s2.x-2,44,C.gold,7);}
   else{glow(s2.x,17,9,'rgb(240,181,65)',.5);px(s2.x-3,14,6,6,C.gold);}}
  for(const tx of [30,290]){glow(tx+1,17,9,'rgb(255,170,60)',.5);
   px(tx,20,2,8,C.wood);px(tx-1,15+Math.sin(tGlobal*10+tx),4,5,C.gold);px(tx,14+Math.sin(tGlobal*13),2,2,'#ff6a30');}
  for(const L of lions)lionDraw(L.x,L.y,((tGlobal*5)|0)%2,safe);
  if(praying>0||safe){dude(p.x,p.y+3,{robe:C.purple,trim:C.gold,beard:'#2a1e14',f:0});
   px(p.x+1,p.y+13,6,1,'#141020');}
  else dude(p.x,p.y,{robe:C.purple,trim:C.gold,beard:'#2a1e14',f:f});
  if(praying>0)bar(p.x-6,p.y-10,20,praying/1.6,C.gold);
  if(safe&&!dlg.cur){angelDraw(154,60-Math.max(0,(2.6-angelT)*20),tGlobal);
   text('"My God hath sent his angel..." 6:22',W/2,120,C.gold,7.5,'center');}
  text('PRAYERS '+prayed+'/3',W-8,6,C.parch,7.5,'right');
  text('the den of lions — Daniel 6',8,6,'#8a84a0',6);
 }};
}

/* ============ GAME 8: ELIJAH (1 Kings 18) — the altar upon Mount Carmel ============ */
function makeElijah(){
 const groundY=150,altarX=176;
 const p={x:40,carry:null,jy:0,vy:0};let f=0,opened=false;let onGround=true;
 /* phases: 0 build (6 stones), 1 wood, 2 water x3, 3 call the fire, 4 the fire falls */
 let phase=0,stonesSet=0,woodSet=0,waterPours=0,pray=0,fireT=0,msgT=0;
 const NEED_STONES=6,NEED_WOOD=4,NEED_WATER=3;
 /* the scattered stones on the mount to be gathered (each carried to the altar) */
 const stones=[];srand(51);
 for(let i=0;i<NEED_STONES;i++)stones.push({x:26+i*22+rnd()*10,y:groundY-4-((rnd()*4)|0),taken:false});
 const woodPile={x:290,y:groundY-6}; /* the wood is fetched from the right */
 const brook={x:300,y:groundY-4};    /* water from the brook / sea to the right */
 /* the false prophets of Baal leaping and mocking — a pressure that rises with difficulty */
 const prophets=[];const NP=[0,2,3][dsel];
 for(let i=0;i<NP;i++)prophets.push({x:60+i*70,y:groundY-8,dir:i%2?1:-1,ph:rnd()*6});
 const pspd=[0,22,34][dsel];
 const timeLimit=[999,70,52][dsel]; let clock=0;
 return{
 update(dt){
  f+=dt*7;msgT=Math.max(0,msgT-dt);
  if(!opened){opened=true;
   sayD([{who:'ELIJAH',txt:'How long halt ye between two opinions? if the LORD be God, follow him: but if Baal, then follow him.',ref:'1 Kings 18:21'},
    {who:'ELIJAH',txt:'The God that answereth by fire, let him be God.',ref:'1 Kings 18:24'}]);}
  if(phase===4){fireT+=dt;if(fireT>2.4)gameWin();return;}
  clock+=dt;
  if(clock>timeLimit&&phase<3)return gameLose(story.loseVerse);
  /* movement (locked during the prayer for the fire) */
  if(phase<3){
   if(keys.left)p.x-=78*dt;if(keys.right)p.x+=78*dt;p.x=clamp(p.x,16,308);
   /* jump to dodge the prophets — press UP */
   if(edge.up&&onGround){p.vy=-150;onGround=false;sfx.step();}
  }
  /* gravity for the jump */
  if(!onGround){p.vy+=520*dt;p.jy+=p.vy*dt;
   if(p.jy>=0){p.jy=0;p.vy=0;onGround=true;}}
  const airborne=p.jy<-8; /* high enough to clear a prophet */
  /* the prophets of Baal leap to and fro — if one touches thee (and thou art not leaping over him), thou art hindered */
  for(const pr of prophets){pr.x+=pr.dir*pspd*dt;
   if(pr.x<30||pr.x>300)pr.dir*=-1;
   pr.y=groundY-8-Math.abs(Math.sin(f*2+pr.ph))*6;
   if(phase<3&&!airborne&&Math.abs(pr.x-p.x)<9&&!pr.cool){pr.cool=.9;
    sfx.clank();shake(1.5,.3);
    if(p.carry){p.carry=null;msgT=2;} /* the jostle makes thee drop what thou bearest */
   }
   if(pr.cool)pr.cool=Math.max(0,pr.cool-dt);}
  /* PHASE 0: gather and set the twelve stones */
  if(phase===0){
   if(!p.carry){for(const s of stones)if(!s.taken&&Math.abs(p.x-s.x)<10&&keys.action){s.taken=true;p.carry='stone';break;}}
   else if(p.carry==='stone'&&Math.abs(p.x-altarX)<14&&edge.action){p.carry=null;stonesSet++;sfx.pick();
    if(stonesSet>=NEED_STONES){phase=1;msgT=2.2;}}
  }
  /* PHASE 1: lay the wood (fetch from the pile to the right) */
  else if(phase===1){
   if(!p.carry){if(Math.abs(p.x-woodPile.x)<14&&keys.action)p.carry='wood';}
   else if(p.carry==='wood'&&Math.abs(p.x-altarX)<14&&edge.action){p.carry=null;woodSet++;sfx.pick();
    if(woodSet>=NEED_WOOD){phase=2;msgT=2.2;}}
  }
  /* PHASE 2: drench the sacrifice three times (fill at the brook, pour on the altar) */
  else if(phase===2){
   if(!p.carry){if(Math.abs(p.x-brook.x)<16&&keys.action){p.carry='water';sfx.step();}}
   else if(p.carry==='water'&&Math.abs(p.x-altarX)<14&&edge.action){p.carry=null;waterPours++;sfx.splash();
    if(waterPours>=NEED_WATER){phase=3;msgT=2.6;
     sayD([{who:'ELIJAH',txt:'LORD God of Abraham, Isaac, and of Israel, let it be known this day that thou art God in Israel.',ref:'1 Kings 18:36'}]);}}
  }
  /* PHASE 3: call on the LORD — hold A to pray; the fire gathers, then falls */
  else if(phase===3){
   if(keys.action){pray+=dt;sfx&&0;}else pray=Math.max(0,pray-dt*.6);
   if(pray>=2.8){phase=4;fireT=0;sfx.blast();sfx.win();shake(4,.9);}
  }
 },
 draw(){
  /* Mount Carmel: brooding storm sky over dry heights */
  vgrad(0,0,W,groundY,[[0,'#4a4256'],[.6,'#6a5a5a'],[1,'#8a6a52']]);
  /* gathered clouds that darken as the prayer rises */
  const gather=phase>=3?clamp(pray/2.8,0,1):(phase===4?1:0);
  srand(5);for(let i=0;i<8;i++){const cx2=((rnd()*W)+tGlobal*4)%(W+80)-40,cy2=6+rnd()*30;
   const cc=mix('#8a8496',(phase>=3?'#1c1826':'#b0a8b4'),gather);
   ctx.fillStyle=cc;ctx.beginPath();ctx.arc(cx2+8,cy2+4,7,0,7);ctx.arc(cx2+18,cy2+2,8,0,7);ctx.arc(cx2+28,cy2+5,6,0,7);ctx.fill();}
  /* the mount / ground */
  vgrad(0,groundY-6,W,H-groundY+6,[[0,'#9a7a4e'],[1,'#5e4630']]);
  for(let x=0;x<W;x+=2)px(x,groundY-6+Math.sin(x*.05)*2,2,2,'rgba(120,92,58,.5)');
  srand(29);for(let i=0;i<40;i++)px((rnd()*W)|0,(groundY+rnd()*(H-groundY))|0,2,1,'rgba(150,116,74,.6)');
  /* the brook at the right */
  {const bx=brook.x;vgrad(bx-8,groundY-3,26,H,[[0,'#3a6a8a'],[1,'#1c3a4e']]);
   for(let y=groundY-2;y<H;y+=4)px(bx-8+Math.sin(y*.5+tGlobal*3)*2,y,24,1.5,'rgba(150,200,220,.4)');
   text('BROOK',bx+4,groundY-12,'#a8d0e0',5.5,'center');}
  /* the wood pile at the right */
  if(phase<=1){const wx=woodPile.x;
   for(let i=0;i<4;i++)px(wx-6+i*3,groundY-8-i,14-i*2,2.4,i%2?'#7a5230':'#5e3c1c');
   if(phase===1)text('WOOD',wx,groundY-16,C.gold,5.5,'center');}
  /* scattered stones not yet gathered */
  if(phase===0)for(const s of stones)if(!s.taken){
   const rg=ctx.createRadialGradient(s.x-1,s.y-1,1,s.x,s.y,5);rg.addColorStop(0,'#a8a29a');rg.addColorStop(1,'#5e5850');
   ctx.fillStyle=rg;ctx.beginPath();ctx.arc(s.x,s.y,4,0,7);ctx.fill();}
  /* THE ALTAR — built up as stones/wood/water are added */
  {const ax=altarX;
   ctx.fillStyle='rgba(16,10,4,.35)';ctx.fillRect(ax-16,groundY+2,34,3);
   /* stone courses rise with stonesSet */
   const courses=Math.ceil(stonesSet/3);
   for(let c=0;c<courses;c++){const yy=groundY-2-c*5;
    for(let sx=-14;sx<14;sx+=7){const rg=ctx.createLinearGradient(0,yy-5,0,yy);
     rg.addColorStop(0,'#b0a89a');rg.addColorStop(1,'#6e665a');ctx.fillStyle=rg;
     ctx.fillRect(ax+sx,yy-5,6.4,5);px(ax+sx,yy-5,6.4,1,'rgba(230,224,210,.4)');}}
   const topY=groundY-2-courses*5;
   /* the wood laid atop */
   if(woodSet>0)for(let i=0;i<woodSet;i++)px(ax-12+i*6,topY-2-((i%2)*1),12,2.4,i%2?'#7a5230':'#5e3c1c');
   /* the drenching water glistens */
   if(waterPours>0){ctx.fillStyle='rgba(150,200,225,'+(0.15+waterPours*.12)+')';
    ctx.fillRect(ax-14,topY-3,28,3+courses);
    if(phase===2)for(let i=0;i<waterPours;i++)px(ax-12+i*10,topY-5,2,3,'#8fd0e8');}
   /* the sacrifice (a simple form) once wood is set */
   if(woodSet>=NEED_WOOD)px(ax-8,topY-6,16,4,phase>=4?shade('#7a5230',-.3):'#8a6a4a');
   /* THE FIRE OF THE LORD falls */
   if(phase===4){const fr=clamp(fireT/.5,0,1);
    glow(ax,topY-20,60,'rgb(255,180,60)',.7);
    for(let i=0;i<18;i++){const fx=ax-14+rnd()*28,fh=10+rnd()*22*fr;
     ctx.fillStyle=['#ffd050','#ff8a30','#ff5a20'][(i+((tGlobal*20)|0))%3];
     ctx.beginPath();ctx.moveTo(fx,topY);ctx.lineTo(fx+3,topY-fh);ctx.lineTo(fx+6,topY);ctx.closePath();ctx.fill();}
    if(fireT<.25)px(0,0,W,H,'rgba(255,240,200,'+(0.6-fireT*2)+')');}
   /* labels */
   if(phase<4){const lab=phase===0?'BUILD THE ALTAR':phase===1?'LAY THE WOOD':phase===2?'POUR THE WATER':'CALL ON THE LORD';
    text(lab,ax,topY-14,C.gold,6.5,'center');}}
  /* the false prophets of Baal, leaping and crying */
  for(const pr of prophets){if(phase>=4)continue;
   dude(pr.x-4,pr.y,{robe:'#6a3a5a',trim:'#3a1a2a',f:(f|0)%2,skin:C.dskin});
   if(Math.sin(f*3+pr.ph)>.5)text('!',pr.x-2,pr.y-12,'#c86a8a',7);}
  /* Elijah */
  const shownCarry=p.carry,ejy=groundY-14+p.jy;
  dude(p.x-4,ejy,{robe:'#6a5238',trim:C.dclay,beard:'#c9c2b4',bl:2,hair:'#7a6a4a',f:(phase<3&&(keys.left||keys.right))?(f|0)%2:0,skin:'#c78d52'});
  if(phase===3){ /* arms raised to heaven in prayer */
   ctx.strokeStyle='#c78d52';ctx.lineWidth=1.8;ctx.lineCap='round';
   ctx.beginPath();ctx.moveTo(p.x-3,groundY-9);ctx.lineTo(p.x-6,groundY-20);ctx.moveTo(p.x+3,groundY-9);ctx.lineTo(p.x+6,groundY-20);ctx.stroke();ctx.lineCap='butt';}
  /* what Elijah carries */
  if(shownCarry==='stone')px(p.x-3,ejy-6,7,5,'#8e867a');
  else if(shownCarry==='wood')px(p.x-5,ejy-5,11,3,'#6a4522');
  else if(shownCarry==='water'){px(p.x-3,ejy-7,7,7,'#5e4a2e');px(p.x-3,ejy-7,7,2,'#8fd0e8');}
  /* HUD */
  if(phase===0){text('STONES '+stonesSet+'/'+NEED_STONES,8,8,C.parch,7);
   text(p.carry?'\u25b8 CARRY TO THE ALTAR (A)':'GATHER A STONE (A)',W/2,H-12,Math.sin(tGlobal*5)>0?C.gold:C.dsand,6.5,'center');}
  else if(phase===1){text('WOOD '+woodSet+'/'+NEED_WOOD,8,8,C.parch,7);
   text(p.carry?'\u25b8 LAY IT ON THE ALTAR (A)':'FETCH WOOD AT RIGHT (A)',W/2,H-12,Math.sin(tGlobal*5)>0?C.gold:C.dsand,6.5,'center');}
  else if(phase===2){text('BARRELS '+waterPours+'/'+NEED_WATER,8,8,C.parch,7);
   text(p.carry?'\u25b8 POUR ON THE ALTAR (A)':'FILL AT THE BROOK (A)',W/2,H-12,Math.sin(tGlobal*5)>0?C.gold:C.dsand,6.5,'center');}
  else if(phase===3){bar(W/2-40,H-20,80,pray/2.8,'#ff8a30');
   text('HOLD A — CALL DOWN THE FIRE',W/2,H-28,Math.sin(tGlobal*7)>0?C.gold:'#ffcf80',7,'center');}
  else text('"The LORD, he is the God!" 18:39',W/2,20,C.gold,8.5,'center');
  if(timeLimit<999&&phase<3){const tl=Math.max(0,timeLimit-clock);
   bar(W-58,8,50,tl/timeLimit,tl<12?'#e05030':'#6a8a4a');text('TIME',W-58,15,C.parch,5.5);}
  if(NP>0&&phase<3)text('UP — LEAP OVER THE PROPHETS',W/2,H-24,'#c9a0b0',6,'center');
  if(msgT>0&&p.carry===null&&phase>0&&phase<3)text(['','ALTAR BUILT — NOW THE WOOD','WOOD LAID — NOW THE WATER'][phase]||'',W/2,32,C.sand,7,'center');
  vignette();
 }};
}

/* ============ MAIN LOOP ============ */
let last=0;
function loop(ts){
 const dt=Math.min(.05,((ts-last)/1000)||0);last=ts;tGlobal+=dt;
 updEdges();musicTick();
 let ox=0,oy=0;
 if(shakeT>0){shakeT-=dt;ox=(Math.random()-.5)*shakeAmt;oy=(Math.random()-.5)*shakeAmt;}
 ctx.setTransform(SC,0,0,SC,ox*SC,oy*SC);
 ctx.fillStyle='#000';ctx.fillRect(-6,-6,W+12,H+12);
 pauseBtn.style.display=(screen==='game'||screen==='pause')?'flex':'none';
 if(screen==='menu'){pauseQ=false;menuUpdate();menuDraw();}
 else if(screen==='intro'){pauseQ=false;introDraw();if(edge.action||tap())startGame();}
 else if(screen==='game'){
  if(pauseQ){pauseQ=false;pSel=0;screen='pause';pauseDraw();}
  else if(dlg.cur){dlgUpdate(dt);if(screen==='game'){game.draw();dlgDraw();}}
  else{game.update(dt);if(screen==='game'){game.draw();if(dlg.cur)dlgDraw();}}}
 else if(screen==='pause'){pauseUpdate();if(screen==='pause')pauseDraw();}
 else if(screen==='win'){winDraw();
  if(edge.down&&winSel===0){winSel=1;sfx.step();}
  if(edge.up&&winSel===1){winSel=0;sfx.step();}
  if(winSel===1){if(edge.left){dsel=(dsel+2)%3;sfx.step();}if(edge.right){dsel=(dsel+1)%3;sfx.step();}}
  /* clicks: the Return button, or a difficulty button (replays that difficulty) */
  if(clickPt){const rbx=W/2-75,rby=H-56;
   if(clickPt.x>=rbx&&clickPt.x<rbx+150&&clickPt.y>=rby&&clickPt.y<rby+16){clickPt=null;sfx.pick();screen='menu';}
   else{let hit=false;for(let i=0;i<3;i++){const bw=54,gap=8,tot=bw*3+gap*2,bx=W/2-tot/2+i*(bw+gap),by=H-28;
    if(clickPt.x>=bx&&clickPt.x<bx+bw&&clickPt.y>=by&&clickPt.y<by+14){dsel=i;clickPt=null;sfx.pick();startGame();hit=true;break;}}
    if(!hit)clickPt=null;}}
  if(edge.action||tap()){if(winSel===0)screen='menu';else startGame();}}
 else if(screen==='lose'){loseDraw();
  if(edge.left){dsel=(dsel+2)%3;sfx.step();}
  if(edge.right){dsel=(dsel+1)%3;sfx.step();}
  if(endDiffClick(H-52)){}
  else if(edge.action||tap()){if(keys.down)screen='menu';else startGame();}}
 clickPt=null;
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
