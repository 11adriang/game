<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sword &amp; Scroll — 8-Bit Bible Tales (KJV)</title>
<style>
html,body{margin:0;padding:0;background:#0d0b14;height:100%;overflow:hidden;touch-action:none;font-family:monospace}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#000}
#pad{position:fixed;bottom:8px;left:0;right:0;display:none;justify-content:space-between;padding:0 12px;z-index:5}
.pbtn{width:50px;height:50px;border-radius:10px;background:rgba(240,181,65,.15);border:2px solid rgba(240,181,65,.5);color:#f0b541;font:bold 18px monospace;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
#dpad{display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:50px 50px 50px;gap:3px}
#dpad .sp{border:none;background:none;pointer-events:none}
@media (pointer:coarse){#pad{display:flex}}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="320" height="180"></canvas></div>
<div id="pad">
 <div id="dpad">
  <div class="pbtn sp"></div><div class="pbtn" data-k="up">&#9650;</div><div class="pbtn sp"></div>
  <div class="pbtn" data-k="left">&#9664;</div><div class="pbtn sp"></div><div class="pbtn" data-k="right">&#9654;</div>
  <div class="pbtn sp"></div><div class="pbtn" data-k="down">&#9660;</div><div class="pbtn sp"></div>
 </div>
 <div style="display:flex;align-items:flex-end"><div class="pbtn" data-k="action" style="width:62px;height:62px;border-radius:50%">A</div></div>
</div>
<script>
'use strict';
/* ============ CORE ============ */
const W=320,H=180;
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function fit(){const padH=matchMedia('(pointer:coarse)').matches?115:0;let s=Math.min(innerWidth/W,(innerHeight-padH)/H);if(s>=2)s=Math.floor(s);cv.style.width=W*s+'px';cv.style.height=H*s+'px';}
addEventListener('resize',fit);fit();

const C={sand:'#e8c170',dsand:'#c99b4a',clay:'#b4553a',dclay:'#7a3b2e',night:'#1a1c3a',sky:'#7fb3d5',water:'#2a5a9a',dwater:'#1c3f70',green:'#5a8a3a',parch:'#f5ecd7',ink:'#181410',gold:'#f0b541',skin:'#d9a066',dskin:'#a5673f',red:'#a53030',gray:'#8a8680',iron:'#6b6f76',purple:'#5a3a6e',wood:'#8a5a2a',dwood:'#5e3c1c'};

let rseed=1;function srand(s){rseed=(s>>>0)||1}
function rnd(){rseed^=rseed<<13;rseed^=rseed>>>17;rseed^=rseed<<5;rseed>>>=0;return rseed/4294967296}
function clamp(v,a,b){return v<a?a:v>b?b:v}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by)}

/* ============ INPUT ============ */
const keys={left:false,right:false,up:false,down:false,action:false};
const lastKeys={},edge={};let actQ=false;
const KEYMAP={ArrowLeft:'left',a:'left',A:'left',ArrowRight:'right',d:'right',D:'right',ArrowUp:'up',w:'up',W:'up',ArrowDown:'down',s:'down',S:'down',' ':'action',Enter:'action'};
addEventListener('keydown',e=>{const k=KEYMAP[e.key];if(k){if(k==='action')actQ=true;keys[k]=true;e.preventDefault();audioInit();}if(e.key==='m'||e.key==='M')musicOn=!musicOn;});
addEventListener('keyup',e=>{const k=KEYMAP[e.key];if(k)keys[k]=false;});
document.querySelectorAll('.pbtn[data-k]').forEach(b=>{const k=b.dataset.k;
 const on=e=>{e.preventDefault();if(k==='action')actQ=true;keys[k]=true;audioInit();};
 const off=e=>{e.preventDefault();keys[k]=false;};
 b.addEventListener('touchstart',on,{passive:false});b.addEventListener('touchend',off);b.addEventListener('touchcancel',off);
 b.addEventListener('mousedown',on);b.addEventListener('mouseup',off);b.addEventListener('mouseleave',off);});
let clickPt=null;
cv.addEventListener('pointerdown',e=>{audioInit();const r=cv.getBoundingClientRect();clickPt={x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H};});
function updEdges(){for(const k in keys){edge[k]=keys[k]&&!lastKeys[k];lastKeys[k]=keys[k];}if(actQ){edge.action=true;actQ=false;}}
function tap(){if(clickPt){clickPt=null;return true}return false}

/* ============ AUDIO (all procedural) ============ */
let AC=null,masterGain=null,musicOn=true;
function audioInit(){if(AC)return;try{AC=new (window.AudioContext||window.webkitAudioContext)();masterGain=AC.createGain();masterGain.gain.value=.5;masterGain.connect(AC.destination);}catch(e){}}
function tone(f,dur,type,vol,slide,when){if(!AC)return;type=type||'square';vol=vol||.3;slide=slide||0;when=when||0;
 const t=AC.currentTime+when,o=AC.createOscillator(),g=AC.createGain();
 o.type=type;o.frequency.setValueAtTime(f,t);
 if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,f+slide),t+dur);
 g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
 o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.02);}
function noiseSfx(dur,vol,fc,when){if(!AC)return;vol=vol||.3;fc=fc||1000;when=when||0;
 const t=AC.currentTime+when,len=Math.floor(AC.sampleRate*dur),buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);
 for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
 const n=AC.createBufferSource();n.buffer=buf;
 const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=fc;
 const g=AC.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
 n.connect(f);f.connect(g);g.connect(masterGain);n.start(t);}
const sfx={
 shoot(){tone(600,.15,'square',.22,-420)},
 clank(){tone(180,.08,'square',.2,-60)},
 hit(){noiseSfx(.18,.32,900)},
 pick(){tone(700,.07,'square',.2);tone(1050,.09,'square',.2,0,.07)},
 trumpet(){[349,440,523].forEach((f,i)=>{tone(f,.55,'sawtooth',.16,25,i*.03)})},
 blast(){[293,370,440,587].forEach((f,i)=>{tone(f,.9,'sawtooth',.15,30,i*.02)});noiseSfx(.5,.25,600,.15)},
 thunder(){noiseSfx(1.1,.4,280)},
 roar(){tone(85,.5,'sawtooth',.28,-40);noiseSfx(.5,.2,400)},
 splash(){noiseSfx(.3,.3,1600)},
 pray(){tone(880,.3,'triangle',.22);tone(1174.7,.4,'triangle',.18,0,.15)},
 angel(){[784,988,1175,1568].forEach((f,i)=>tone(f,.4,'triangle',.18,0,i*.1))},
 win(){[523,659,784,1046].forEach((f,i)=>tone(f,.26,'square',.22,0,i*.14))},
 lose(){[392,330,262,196].forEach((f,i)=>tone(f,.3,'triangle',.24,0,i*.18))},
 step(){tone(160,.04,'square',.06)}
};
/* Menu music: hijaz (double harmonic) mode on D — Middle Eastern scale, generated by pattern math */
let mNext=0,mStep=0;
const HIJAZ=[293.66,311.13,370.0,392.0,440.0,466.16,554.37,587.33];
const MPAT=[0,2,1,0,3,2,4,3,5,4,3,2,1,2,0,-1,0,1,2,4,3,2,4,5,7,5,4,3,2,1,0,-1];
function musicTick(){if(!AC||!musicOn||screen!=='menu'){if(AC)mNext=AC.currentTime;return}
 while(mNext<AC.currentTime+.25){const i=MPAT[mStep%MPAT.length];const w=mNext-AC.currentTime;
  if(i>=0)tone(HIJAZ[i],.22,'triangle',.055,0,Math.max(0,w));
  if(mStep%8===0)tone(HIJAZ[0]/2,.9,'sine',.045,0,Math.max(0,w));
  mNext+=.26;mStep++;}}

/* ============ DRAW HELPERS ============ */
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w,h);}
function text(str,x,y,c,size,align){ctx.fillStyle=c||C.parch;ctx.font=(size||7)+'px monospace';ctx.textAlign=align||'left';ctx.textBaseline='top';ctx.fillText(str,x,y);}
function wrap(str,maxChars){const words=str.split(' '),lines=[];let cur='';
 for(const w2 of words){if((cur+' '+w2).trim().length>maxChars){lines.push(cur.trim());cur=w2;}else cur+=' '+w2;}
 if(cur.trim())lines.push(cur.trim());return lines;}
function bar(x,y,w,frac,c){px(x,y,w,5,C.ink);px(x,y,w,1,C.gold);px(x,y+4,w,1,C.gold);px(x+1,y+1,Math.round((w-2)*clamp(frac,0,1)),3,c);}
function hearts(n){for(let i=0;i<n;i++){const x=6+i*9,y=4;px(x,y,2,2,C.red);px(x+3,y,2,2,C.red);px(x,y+1,5,2,C.red);px(x+1,y+3,3,1,C.red);px(x+2,y+4,1,1,C.red);}}
/* Middle-eastern zigzag border motif */
function zig(y,c){for(let x=0;x<W;x+=8){px(x,y,4,2,c);px(x+4,y+2,4,2,c);}}
/* small robed figure, ~8x12 */
function dude(x,y,o){o=o||{};const f=(o.f|0)%2,skin=o.skin||C.skin,robe=o.robe||C.clay,lc='#4a2e1a';
 if(o.head){px(x+1,y-1,6,2,o.head);px(x+1,y+1,1,4,o.head);px(x+6,y+1,1,4,o.head);}
 else if(o.hair)px(x+2,y-1,4,1,o.hair);
 px(x+2,y,4,3,skin);
 px(x+(o.flip?2:4),y+1,1,1,C.ink);
 if(o.beard)px(x+2,y+3,4,o.bl||1,o.beard);
 px(x+1,y+4,6,6,robe);
 if(o.trim)px(x+1,y+9,6,1,o.trim);
 px(x+2,y+10,2,f?1:2,lc);px(x+4,y+10,2,f?2:1,lc);
 if(o.staff){px(x+(o.flip?-1:8),y-2,1,13,C.wood);}
 if(o.torch){const tx=x+(o.flip?-1:8);px(tx,y+1,1,6,C.wood);px(tx-1,y-2,3,3,C.gold);px(tx,y-3,1,1,C.red);}
 if(o.trumpetp){px(x+(o.flip?-3:8),y+2,4,1,C.gold);px(x+(o.flip?-4:11),y+1,1,3,C.gold);}}
function lionDraw(x,y,f,sleep){const c=C.dsand,m='#8a5a2a';
 px(x,y+2,10,5,c);px(x+8,y,5,6,m);px(x+9,y+1,3,3,c);
 if(!sleep)px(x+11,y+2,1,1,C.ink);
 px(x-2,y+2,2,1,c);px(x-3,y+1,1,1,m);
 px(x+1,y+7,2,3,c);px(x+6+(f?1:0),y+7,2,3,c);
 if(sleep)text('z',x+12,y-6,C.parch,6);}
function angelDraw(x,y,t){ctx.fillStyle='rgba(245,236,215,.18)';ctx.fillRect(x-9,y-4,26,22);
 px(x-8,y+3,6,7,C.parch);px(x+10,y+3,6,7,C.parch);
 dude(x,y,{robe:C.parch,skin:'#e8c8a0',beard:false});
 px(x+2,y-3,4,1,C.gold);
 const s=Math.sin(t*6)>0;if(s){px(x-9,y+2,2,2,C.gold);px(x+15,y+2,2,2,C.gold);}}
function ramDraw(x,y){px(x,y,9,5,'#cbbca0');px(x+1,y+5,2,3,'#9a8c72');px(x+6,y+5,2,3,'#9a8c72');
 px(x+7,y-2,4,4,'#b0a284');px(x+10,y-1,1,1,C.ink);
 px(x+10,y-4,2,2,C.gray);px(x+12,y-3,1,3,C.gray);px(x+11,y-1,1,1,C.gray);}

/* ============ PORTRAITS (procedural, parameterized) ============ */
function drawPortrait(x,y,s,o){
 // face
 px(x+4*s,y+3*s,8*s,6*s,o.skin);
 px(x+6*s,y+5*s,s,s,C.ink);px(x+9*s,y+5*s,s,s,C.ink);
 px(x+7*s,y+6*s,2*s,s,o.skinD||C.dskin);
 // headwear
 if(o.headType==='cloth'){px(x+3*s,y+1*s,10*s,2*s,o.head);px(x+3*s,y+3*s,s,7*s,o.head);px(x+12*s,y+3*s,s,7*s,o.head);px(x+3*s,y+2*s,10*s,s,o.band||C.gold);}
 else if(o.headType==='helmet'){px(x+4*s,y+1*s,8*s,3*s,o.head);px(x+3*s,y+3*s,s,3*s,o.head);px(x+12*s,y+3*s,s,3*s,o.head);px(x+6*s,y,4*s,s,C.red);}
 else if(o.headType==='cap'){px(x+4*s,y+1*s,8*s,2*s,o.head);px(x+4*s,y+2*s,8*s,s,o.band||C.gold);}
 else if(o.headType==='hair'){px(x+4*s,y+1*s,8*s,2*s,o.hair);px(x+3*s,y+2*s,s,4*s,o.hair);px(x+12*s,y+2*s,s,4*s,o.hair);}
 // beard
 if(o.beardLen){px(x+4*s,y+8*s,8*s,o.beardLen*s,o.beard);px(x+7*s,y+8*s,2*s,s,o.skinD||C.dskin);}
 // shoulders
 px(x+2*s,y+12*s,12*s,4*s,o.robe);
 px(x+7*s,y+12*s,2*s,4*s,o.trim||o.head||C.gold);
}
const PORTS={
 abraham:{skin:C.skin,headType:'cloth',head:C.parch,band:C.dclay,beard:'#c9c2b4',beardLen:4,robe:C.wood,trim:C.gold},
 noah:{skin:'#cf9a5e',headType:'cloth',head:'#7a8a9a',band:'#4a5a6a',beard:'#e8e2d4',beardLen:5,robe:'#4a5a6a',trim:C.parch},
 moses:{skin:C.skin,headType:'cloth',head:C.parch,band:C.clay,beard:'#e8e2d4',beardLen:5,robe:C.clay,trim:C.gold},
 joshua:{skin:'#c78d52',headType:'helmet',head:'#b08d3e',beard:'#3a2a1a',beardLen:2,robe:C.iron,trim:C.red},
 gideon:{skin:C.skin,headType:'hair',hair:'#3a2a1a',beard:'#3a2a1a',beardLen:2,robe:C.green,trim:C.wood},
 david:{skin:'#e0a875',headType:'hair',hair:'#8a4a2a',beardLen:0,robe:C.sand,trim:C.clay},
 daniel:{skin:C.skin,headType:'cap',head:C.purple,band:C.gold,beard:'#2a1e14',beardLen:3,robe:C.purple,trim:C.gold},
 peter:{skin:'#cf9a5e',headType:'hair',hair:'#5e3c1c',beard:'#5e3c1c',beardLen:3,robe:'#2e6e6a',trim:C.parch}
};

const STORIES=[

/* ============ SCREENS ============ */
let screen='menu',story=null,game=null,selIdx=0,tGlobal=0,loseMsg='';
function startStory(s){story=s;screen='intro';sfx.pick();}
function startGame(){game=story.make();screen='game';}
function gameWin(){screen='win';sfx.win();}
function gameLose(msg){loseMsg=msg||story.loseVerse;screen='lose';sfx.lose();}

function menuUpdate(){
 if(edge.left)selIdx=(selIdx+7)%8,sfx.step();
 if(edge.right)selIdx=(selIdx+1)%8,sfx.step();
 if(edge.up||edge.down)selIdx=(selIdx+4)%8,sfx.step();
 if(clickPt){for(let i=0;i<8;i++){const cx=8+(i%4)*77,cy2=i<4?46:112;
  if(clickPt.x>=cx&&clickPt.x<cx+72&&clickPt.y>=cy2&&clickPt.y<cy2+58){
   if(selIdx===i)startStory(STORIES[i]);else{selIdx=i;sfx.step();}
   clickPt=null;break;}}}
 if(edge.action)startStory(STORIES[selIdx]);
}
function menuDraw(){
 px(0,0,W,H,C.night);
 srand(7);for(let i=0;i<70;i++){px((rnd()*W)|0,(rnd()*95)|0,1,1,rnd()<.25?C.gold:C.parch);}
 // crescent moon
 px(276,12,14,14,C.parch);px(272,10,12,14,C.night);
 // distant city: domes & towers
 srand(31);for(let x=6;x<W;x+=26){const h=8+((rnd()*10)|0);
  px(x,100-h,10,h,'#241c2e');px(x+2,96-h,6,4,'#241c2e');
  if(rnd()<.5){px(x+16,92,3,8,'#241c2e');px(x+15,90,5,2,'#241c2e');}}
 px(0,100,W,80,'#3a2c22');
 for(let x=0;x<W;x+=2){const h=Math.sin(x*.03)*4+Math.sin(x*.09+2)*2;px(x,104+h,2,76,'#4a3a2e');}

 let chain=[],inCount=0,T=0,TOTAL=80,done=false,doneT=0,thT=6;
 function beastDraw(b,fr){const col=TYPES[b.type][1],nm=TYPES[b.type][0];

 let chariotX=-170,phase=0,closeT=0;
 const rocks=[],pools=[];
 srand(42);
 for(let i=0;i<26;i++)rocks.push({x:180+rnd()*(TOTAL-260),y:62+rnd()*84});
 for(let i=0;i<14;i++)pools.push({x:220+rnd()*(TOTAL-320),y:60+rnd()*80,w:26+rnd()*20});
 return{
 update(dt){
  f+=dt*7;
  if(phase===1){closeT+=dt;if(closeT>2.4)gameWin();return;}
  slowT=Math.max(0,slowT-dt);
  let spd=76;if(slowT>0)spd=34;
  let inPool=false;
  for(const pl of pools)if(p.x+4>pl.x&&p.x<pl.x+pl.w&&Math.abs(p.y+8-pl.y)<7)inPool=true;
  if(inPool)spd=36;
  if(keys.left)p.x-=spd*dt*.7;if(keys.right)p.x+=spd*dt;
  if(keys.up)p.y-=60*dt;if(keys.down)p.y+=60*dt;
  p.x=clamp(p.x,chariotX+30,TOTAL+40);p.y=clamp(p.y,56,140);
  trail.push(p.x,p.y);
  for(const r of rocks)if(dist(p.x+4,p.y+7,r.x+3,r.y+2)<8&&slowT<=0){slowT=.7;p.x-=6;sfx.clank();}
  chariotX+=64*dt;
  if(chariotX>=p.x-16)return gameLose(story.loseVerse);
  if(p.x>=TOTAL){phase=1;sfx.blast();sfx.splash();}
 },

   if(rx-cx>-6&&rx-cx<W){px(rx-cx,ry,3,2,'#d8c8a8');px(rx-cx+3,ry,1,1,'#b8a888');}}
  for(const pl of pools){const sx=pl.x-cx;if(sx>-60&&sx<W){px(sx,pl.y-4,pl.w,9,'#6a6a4a');px(sx+2,pl.y-2,pl.w-4,5,'#8a8a5a');}}
  for(const r of rocks){const sx=r.x-cx;if(sx>-10&&sx<W){px(sx,r.y,7,5,C.gray);px(sx+1,r.y-2,4,3,'#a8a49e');}}
  // walls of water, animated
  const closing=phase===1?closeT/2.4:0;
  for(let x=0;x<W;x+=2){const wx=x+cx;
   let topH=44+Math.sin((wx+tGlobal*36)*.08)*4;
   let botY=142+Math.sin((wx+tGlobal*30)*.07+2)*4;

function makeGideon(){

  {wp:[[252,50],[252,130]],i:0,x:252,y:120}];
 let placed=0,finale=false,finT=0,plant=0;
 function blocked(x1,y1,x2,y2){ // tents block sight
  for(const t2 of tents){const mx=t2.x+9,my=t2.y+6;
   const L=dist(x1,y1,x2,y2);if(L<1)continue;
   const t3=clamp(((mx-x1)*(x2-x1)+(my-y1)*(y2-y1))/(L*L),0,1);
   if(dist(x1+(x2-x1)*t3,y1+(y2-y1)*t3,mx,my)<10)return true;}
  return false;}
 return{
 update(dt){
  f+=dt*6;

  const spd=58;let mv=false;

   if(plant>=1.2){m.done=true;placed++;plant=0;sfx.pick();}}

/* ============ GAME 1: ABRAHAM (Genesis 22) ============ */
function makeAbraham(){
 const LEN=1300;
 // ascending terrain segments with gaps
 const segs=[];let sx=0,sy=158;
 srand(77);
 while(sx<LEN){const w=70+rnd()*90;segs.push({x0:sx,x1:sx+w,y:sy});
  sx+=w+(sx>140&&sx<LEN-160?16+rnd()*14:0);sy-=8+rnd()*8;}

 const p={x:20,y:groundAt(20)-12,vy:0,on:true};
 let f=0,hp=3,inv=0,phase=0,phT=0;
 const trail=makeTrail(p.x,p.y);
 let rocks=[],rockT=2.5;
 function groundAt(x){for(const s2 of segs)if(x>=s2.x0&&x<=s2.x1)return s2.y;return 999;}
 return{
 update(dt){
  f+=dt*7;inv=Math.max(0,inv-dt);
  if(phase===1){phT+=dt;if(phT>3){phase=2;sfx.pick();}return;}
  if(phase===2){
   const spd=52;
   if(keys.left)p.x-=spd*dt;if(keys.right)p.x+=spd*dt;
   p.x=clamp(p.x,altarX-120,altarX+8);p.y=groundAt(p.x)-12;
   trail.push(p.x,p.y);
   if(Math.abs(p.x-(altarX-64))<10&&edge.action)gameWin();
   return;}
  const spd=56;

  const g=groundAt(p.x+4);

  if(p.y>H+10){hp--;sfx.splash();

  trail.push(p.x,p.y);

   rocks.push({x:p.x+180,y:groundAt(p.x+180)-60,vx:-52,vy:0});}
  for(const r of rocks){r.vx-=6*dt;r.x+=r.vx*dt;const rg=groundAt(r.x);

   if(inv<=0&&dist(r.x,r.y,p.x+4,p.y+6)<8){hp--;inv=1.4;sfx.hit();
    if(hp<=0)return gameLose(story.loseVerse);}}
  rocks=rocks.filter(r=>r.x>p.x-200&&r.y<H+40);
  if(p.x>=altarX-6){phase=1;phT=0;sfx.angel();}
 },

  dude(4,seaY-28,{robe:'#4a5a6a',f:0,skin:C.skin});dude(22,seaY-28,{robe:C.dclay,f:0,skin:C.skin});
  // Jesus, glowing on the sea
  ctx.fillStyle='rgba(245,236,215,.14)';ctx.fillRect(276,seaY-26,20,26);
  dude(280,seaY-22+Math.sin(tGlobal*1.5),{robe:C.parch,beard:'#5e3c1c',hair:'#5e3c1c',f:0,skin:'#e0b088'});
  px(282,seaY-26,4,1,C.gold);
  // Peter — sinks as faith falls
  const sink=(1-faith)*13;
  const py=seaY-11+sink+Math.sin(tGlobal*2.5)*1.5;
  dude(p.x,py,{robe:'#2e6e6a',trim:C.parch,beard:'#5e3c1c',hair:'#5e3c1c',f:f,skin:'#cf9a5e'});
  px(p.x-1,seaY+2,10,3,'#2a5088');
  if(sink>5)for(let i=0;i<3;i++)px(p.x-2+i*5,seaY+Math.sin(tGlobal*8+i)*2,2,2,'#8fb0d8');
  // wind streaks
  if(gust>0){srand((tGlobal*12)|0);
   for(let i=0;i<12;i++){const wy=20+rnd()*120,wx=(W-((tGlobal*260+i*40)%(W+40)));
    px(wx,wy,14+rnd()*10,1,'#aab8d8');}
   text(Math.sin(tGlobal*8)>0?'THE WIND IS BOISTEROUS — HOLD A, LOOK TO HIM':'',W/2,30,C.gold,7,'center');}
  bar(8,6,90,faith,faith>.4?C.gold:C.red);
  text('FAITH',8,13,C.parch,6);
  if(gust>0&&keys.action)text('"Be of good cheer; it is I; be not afraid." 14:27',W/2,44,C.parch,6,'center');
 }};
}

/* ============ MAIN LOOP ============ */
let last=0;
function loop(ts){
 const dt=Math.min(.05,((ts-last)/1000)||0);last=ts;tGlobal+=dt;
 updEdges();musicTick();
 if(screen==='menu'){menuUpdate();menuDraw();}
 else if(screen==='intro'){introDraw();if(edge.action||tap())startGame();}
 else if(screen==='game'){game.update(dt);game.draw();}
 else if(screen==='win'){winDraw();if(edge.action||tap())screen='menu';}
 else if(screen==='lose'){loseDraw();
  if(edge.action||tap()){if(keys.down)screen='menu';else startGame();}}
 clickPt=null;
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
